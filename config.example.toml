# m3u8-extractor example configuration
# Place this file at ./config.toml or ~/.config/m3u8-extractor/config.toml

# ── Paths ────────────────────────────────────────────────────────────────────

# urls_file = "urls.txt"               # Path to the URL list file (string or list)
# urls_file = ["batch1.txt", "batch2.txt"]  # Multiple files
# urls_file = "url-batches/"           # A directory of .txt files

# output_path = "downloads/"           # Default output directory or filename template
# output_path = ["downloads/", "/mnt/backup/"]  # Multiple: first is target, extras get copies

# ── Title ────────────────────────────────────────────────────────────────────

# title_prefix = ""                    # Prepended to every output filename
# title_postfix = ""                   # Appended to every output filename (before extension)

# ── Network ──────────────────────────────────────────────────────────────────

# referrer = ""                        # Referer header for requests
# use_base_url_as_referrer = false     # Auto-set referer from each page's base URL
# cookies = ""                         # Path to a Netscape-format cookies file
# proxy = ""                           # Proxy for yt-dlp (e.g. "socks5://127.0.0.1:1080")
# browser_proxy = ""                   # Proxy for Chrome (defaults to proxy if not set)
# ignore_ssl_errors = false            # Ignore SSL certificate errors
# user_agent = ""                      # Custom User-Agent string for requests and browser

# [cookies]                             # Direct cookies (name=value), like localstorage
# "sessionid" = "abc123"
# "cf_clearance" = "your_token_here"

# ── localStorage ──────────────────────────────────────────────────────────────
# Set localStorage entries on the target domain before the page loads.
# Useful for player preferences (e.g. JWPlayer quality label).

# [localstorage]
# "jwplayer.qualityLabel" = "HQ"
# "player.volume" = "0.8"

# ── Headers & auth ─────────────────────────────────────────────────────────────

# auth = "user:password"               # HTTP basic auth

# [headers]
# "X-Custom-Token" = "abc123"
# "Accept-Language" = "en-US"

# ── Quality & transcoding ────────────────────────────────────────────────────

# quality = "bestvideo+bestaudio"      # yt-dlp format selector
# transcode = "mp4"                    # Post-download transcode format (mp4, mkv, etc.)

# ── yt-dlp binary ────────────────────────────────────────────────────────────

# use_system_ytdlp = false             # Use the system yt-dlp binary instead of Python lib
# yt_dlp_path = "/usr/local/bin/yt-dlp"  # Path to a specific yt-dlp binary
# ytdlp_args = "--limit-rate 1M --retries 10"  # Extra raw arguments for yt-dlp
# generic_impersonate = false          # Add --extractor-args "generic:impersonate"

# ── Extractor ────────────────────────────────────────────────────────────────

# extractor = "auto"                   # "auto", "ytdlp", or "m3u8"
# extractors = "youtube,vimeo"          # Restrict yt-dlp to these extractors only
# use_selenium_session_for_download = false  # Reuse Selenium headers/cookies for yt-dlp stream downloads

# ── Parallelism ──────────────────────────────────────────────────────────────

# parallel = "all"                     # "all", a number, "cores", or "logical_cores"
# speed_unit = "bytes"                 # "bytes" (KB/s, MB/s) or "bits" (Kbps, Mbps)
# scan_depth = 0                       # Directory recursion depth (0 = top-level, -1 = unlimited)

# ── m3u8 selection ───────────────────────────────────────────────────────────

# m3u8_select = "first"               # "first", "last", "all", or "interactive"
# m3u8_filter = ""                    # Regex to filter m3u8 URLs before selection
# video_filter = ""                   # Regex to filter direct video URLs before selection
# stream_type = "both"                # "both", "m3u8", or "video"

# ── Adblock ──────────────────────────────────────────────────────────────────

# adblock = false                      # Load uBlock Origin Lite in Chrome
# adblock_strictness = "complete"      # "basic", "optimal", or "complete"
# adblock_extension = ""               # Path to a custom .crx adblocker extension

# ── Download modes ───────────────────────────────────────────────────────────
# All false by default (standard yt-dlp behaviour: download everything)

# thumbnail = false                    # Download thumbnail alongside the video
# thumbnail_only = false               # Download only the thumbnail
# captions = false                     # Download captions alongside the video
# captions_only = false                # Download only captions
# audio_only = false                   # Download only the audio stream
# video_only = false                   # Download only the video stream (no audio)
# video_and_captions_only = false      # Download video and captions only (no audio)
# overwrite = true                     # Overwrite existing files (false to skip)

# ── URL rules ────────────────────────────────────────────────────────────────
# Pattern-matched per-site config. All matching rules are merged in order.
# Any config key above can be used inside a rule.

# [[url_rules]]
# pattern = "youtube\\.com|youtu\\.be"
# extractor = "ytdlp"

# [[url_rules]]
# pattern = "example\\.com/music"
# audio_only = true
# quality = "bestaudio"
# output_path = "music/"

# [[url_rules]]
# pattern = "sketchy-site\\.com"
# adblock = true
# generic_impersonate = true
# ignore_ssl_errors = true
# proxy = "socks5://127.0.0.1:1080"
